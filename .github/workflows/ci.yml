name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_ADMIN_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      PGPASSWORD: postgres
      # Must match the password migration 0033 bakes into the svc_* roles (the migration
      # reads a Postgres GUC, not this env var — CI was the first environment to actually
      # verify these passwords; local dev uses trust auth and never checks them).
      SERVICE_DB_PASSWORD: service-dev-password
      DB_POOL_MAX: "2"
      TEST_STACK_READY_TIMEOUT_MS: "90000"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run check
      - run: npm run test
      - run: npm run test:integration
      - run: npm run test:concurrency

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t treasury-platform:${{ github.sha }} .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: treasury-platform:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
